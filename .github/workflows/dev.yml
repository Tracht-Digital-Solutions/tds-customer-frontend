name: Dev build → dev branch

# On every push to main (and manual), build the panel and force-publish dist/ to
# the orphan `dev` branch — the continuously-built dev artifact + build gate. NOT
# deployed; production goes via release.yml. Installs the host + extensions from
# GitHub Packages (NPM_TOKEN = PACKAGE_TOKEN via the committed .npmrc).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NPM_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-package-lock

      - name: Build
        run: npm run build

      - name: Publish dist to dev
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PACKAGE_TOKEN }}
          publish_dir: ./dist
          publish_branch: dev
          force_orphan: true
          commit_message: "dev ${{ github.sha }}"
